version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "javascript"
    versioning-strategy: "increase"
    open-pull-requests-limit: 8
