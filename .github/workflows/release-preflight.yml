name: Release Preflight

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-tag.yml"
      - "scripts/release/**"
      - "scripts/ci/check-public-export.mjs"
      - "public.manifest.json"

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Setup pnpm
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Build
        run: corepack pnpm -r build

      - name: Test
        run: corepack pnpm -r test

      - name: Deterministic Replay Gate
        run: corepack pnpm eval:replay

      - name: Build Public Export
        run: corepack pnpm public:build

      - name: Public Export Anti-Leak Gate
        run: corepack pnpm check:public-export

      - name: Write Preflight Summary
        run: |
          cat <<'EOF' > release-preflight-summary.md
          # Release Preflight Summary

          - Build: passed
          - Tests: passed
          - Deterministic replay: passed
          - Public export build: passed
          - Public export anti-leak gate: passed
          - Commit: ${{ github.sha }}
          EOF

      - name: Upload Preflight Summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-preflight-summary
          path: release-preflight-summary.md
