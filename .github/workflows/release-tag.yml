name: Release On Tag

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Setup pnpm
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Build
        run: corepack pnpm -r build

      - name: Test
        run: corepack pnpm -r test

      - name: Deterministic Replay Gate
        run: corepack pnpm eval:replay

      - name: Build Public Snapshot
        run: corepack pnpm public:build

      - name: Archive Public Snapshot
        run: |
          tar -czf xyavoryx-public-${{ github.ref_name }}.tar.gz dist-public
          sha256sum xyavoryx-public-${{ github.ref_name }}.tar.gz > xyavoryx-public-${{ github.ref_name }}.sha256
          corepack pnpm release:manifest -- --output xyavoryx-public-${{ github.ref_name }}.manifest.json dist-public xyavoryx-public-${{ github.ref_name }}.tar.gz xyavoryx-public-${{ github.ref_name }}.sha256

      - name: Generate Build Provenance Attestation
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # v4
        with:
          subject-path: |
            xyavoryx-public-${{ github.ref_name }}.tar.gz
            xyavoryx-public-${{ github.ref_name }}.sha256
            xyavoryx-public-${{ github.ref_name }}.manifest.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            xyavoryx-public-${{ github.ref_name }}.tar.gz
            xyavoryx-public-${{ github.ref_name }}.sha256
            xyavoryx-public-${{ github.ref_name }}.manifest.json
          generate_release_notes: true
