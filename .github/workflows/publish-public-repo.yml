name: Publish Public Repository

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Target public repository (owner/name)"
        required: true
        default: "XyaVora/XyaVoryx"
      target_branch:
        description: "Target public branch"
        required: true
        default: "main"
      release_tag:
        description: "Optional release tag to create in public repository (e.g. v0.2.0)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Build
        run: corepack pnpm -r build

      - name: Test
        run: corepack pnpm -r test

      - name: Deterministic Replay Gate
        run: corepack pnpm eval:replay

      - name: Build Public Snapshot
        run: corepack pnpm public:build

      - name: Public Export Anti-Leak Gate
        run: corepack pnpm check:public-export

      - name: Validate Optional Release Tag Format
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            exit 0
          fi

          if ! echo "$RELEASE_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "release_tag must follow semantic version format: vMAJOR.MINOR.PATCH"
            exit 1
          fi

  publish:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Build Public Snapshot
        run: corepack pnpm public:build

      - name: Clone Public Repository
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          if [ -z "$PUBLIC_REPO_TOKEN" ]; then
            echo "Missing required secret: PUBLIC_REPO_TOKEN"
            exit 1
          fi
          git clone --depth 1 --branch "$TARGET_BRANCH" "https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/${TARGET_REPO}.git" public-repo

      - name: Sync Public Content
        run: |
          rsync -a --delete --exclude ".git/" dist-public/ public-repo/

      - name: Commit and Push Public Repository
        env:
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          cd public-repo
          git config user.name "xyavoryx-release-bot"
          git config user.email "xyavoryx-release-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No public changes to publish."
          else
            git commit -m "chore(release): sync public snapshot from private source"
            git push origin "$TARGET_BRANCH"
          fi

      - name: Create and Push Public Release Tag
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "No release tag requested."
            exit 0
          fi
          cd public-repo
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag already exists in local clone: $RELEASE_TAG"
            exit 0
          fi
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"
