name: Publish Public Repository

on:
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: "Type EXACT phrase: I_UNDERSTAND_THIS_PUBLISHES_TO_PUBLIC"
        required: true
        default: ""
      target_repo:
        description: "Target public repository (owner/name)"
        required: true
        default: "XyaVora/XyaVoryx"
      target_branch:
        description: "Target public branch"
        required: true
        default: "main"
      release_tag:
        description: "Optional release tag to create in public repository (e.g. v0.2.0)"
        required: false
        default: ""
      release_scope:
        description: "Release scope policy for tag validation (`patch` for small updates, `minor` for large updates)"
        required: true
        default: "patch"

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce Main Branch Only
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$REF_NAME" != "main" ]; then
            echo "Publish workflow is allowed only from main branch."
            exit 1
          fi

      - name: Enforce Explicit Publish Confirmation
        env:
          CONFIRM_PUBLISH: ${{ inputs.confirm_publish }}
        run: |
          if [ "$CONFIRM_PUBLISH" != "I_UNDERSTAND_THIS_PUBLISHES_TO_PUBLIC" ]; then
            echo "Confirmation phrase mismatch. Refusing to publish."
            exit 1
          fi

      - name: Checkout Private Source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Run Release Readiness Gate
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_SCOPE: ${{ inputs.release_scope }}
          RELEASE_READINESS_REPORT_PATH: release-readiness-report.json
          PUBLIC_SYNC_REPO_URL: https://github.com/${{ inputs.target_repo }}.git
          PUBLIC_SYNC_TARGET_BRANCH: ${{ inputs.target_branch }}
        run: corepack pnpm release:readiness

      - name: Upload Release Readiness Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-readiness-report
          path: release-readiness-report.json

      - name: Upload Public Source Match Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: public-source-match-report
          path: public-source-match-report.json

  publish:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Build Public Snapshot
        run: corepack pnpm public:build

      - name: Clone Public Repository
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          if [ -z "$PUBLIC_REPO_TOKEN" ]; then
            echo "Missing required secret: PUBLIC_REPO_TOKEN"
            exit 1
          fi
          git clone --depth 1 --branch "$TARGET_BRANCH" "https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/${TARGET_REPO}.git" public-repo

      - name: Sync Public Content
        run: |
          rsync -a --delete --exclude ".git/" dist-public/ public-repo/

      - name: Commit and Push Public Repository
        env:
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          cd public-repo
          git config user.name "XyaVora"
          git config user.email "xyaVora@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No public changes to publish."
            echo "PUBLIC_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
            echo "PUBLISHED_NEW_COMMIT=0" >> "$GITHUB_ENV"
          else
            git commit -m "chore(release): sync public snapshot from private source"
            git push origin "$TARGET_BRANCH"
            echo "PUBLIC_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
            echo "PUBLISHED_NEW_COMMIT=1" >> "$GITHUB_ENV"
          fi

      - name: Create and Push Public Release Tag
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "No release tag requested."
            exit 0
          fi
          cd public-repo
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag already exists in local clone: $RELEASE_TAG"
            exit 0
          fi
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Generate Release Trace Manifest
        env:
          PRIVATE_COMMIT_SHA: ${{ github.sha }}
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          PUBLIC_COMMIT_SHA: ${{ env.PUBLIC_COMMIT_SHA }}
        run: |
          corepack pnpm release:trace -- --output release-trace.json --private-repo XyaVora/xyavoryx-private --public-repo "$TARGET_REPO" --private-commit "$PRIVATE_COMMIT_SHA" --public-commit "$PUBLIC_COMMIT_SHA" --release-tag "$RELEASE_TAG" --target-branch "$TARGET_BRANCH"

      - name: Upload Release Trace Manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-trace
          path: release-trace.json
